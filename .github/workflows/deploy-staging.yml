name: Build & Deploy (Staging)

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - run: npm run lint
      - run: npm test
      - name: Performance budget check
        run: bash scripts/perf-check.sh

      - name: Build smoke test
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html not found" && exit 1)
          echo "✅ Build OK — dist/ contains $(find dist -type f | wc -l) files"

      - name: Build for E2E tests
        run: npm run build:test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --reporter=list

      - name: Build for staging (different base path)
        run: npm run build
        env:
          BASE_PATH: /mejoracontactos-staging/

      # Deploy to staging path (different from production)
      - name: Upload dist via SCP (staging)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/*"
          target: /home/u846064658/domains/mejoraok.com/public_html/util/mejoracontactos-staging
          strip_components: 1

      - name: Post-deploy smoke test (staging)
        run: |
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://util.mejoraok.com/mejoracontactos-staging/" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Staging deploy OK — HTTP $HTTP_CODE"
            echo "🔗 https://util.mejoraok.com/mejoracontactos-staging/"
          else
            echo "⚠️ Staging deploy may have issues — HTTP $HTTP_CODE"
          fi
